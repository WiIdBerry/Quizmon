<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6841c6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TypeLearner">
  <meta name="description" content="Lerne Pokémon-Typen und ihre Wechselwirkungen in kurzen Quiz-Einheiten.">
  <title>PokémonTypLearner</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <div class="app-shell">
    <header class="topbar">
      <button id="backButton" class="icon-button hidden" aria-label="Zurück">
        <span aria-hidden="true">‹</span>
      </button>

      <button id="brandButton" class="brand" aria-label="Startseite">
        <span class="brand-mark"><span>PT</span></span>
        <span class="brand-copy">
          <strong>PokémonTypLearner</strong>
          <small>v0.6.1 · Alpha</small>
        </span>
      </button>

      <button id="levelButton" class="header-metric" aria-label="Level anzeigen">
        <span class="metric-level" id="levelNumber">Lv. 1</span>
        <span class="metric-streak" id="headerStreak">🔥 0</span>
      </button>
    </header>

    <main id="view" class="view" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <button class="nav-item active" data-route="home"><span class="nav-icon">⌂</span><small data-nav-label="home">Start</small></button>
      <button class="nav-item" data-route="learn"><span class="nav-icon">◇</span><small data-nav-label="learn">Lernen</small></button>
      <button class="nav-item" data-route="stats"><span class="nav-icon">▥</span><small data-nav-label="stats">Statistik</small></button>
      <button class="nav-item" data-route="settings"><span class="nav-icon">⚙</span><small data-nav-label="settings">Optionen</small></button>
    </nav>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root" aria-live="polite"></div>

  <script src="data.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
